<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Panel de viaje</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: #0f1117;
      color: #fff;
      font-family: -apple-system, system-ui, sans-serif;
      overflow: hidden;
    }

    body {
      display: flex;
      flex-direction: column;
      padding: 16px;
    }

    h1 {
      font-size: 18px;
      font-weight: 400;
      opacity: 0.6;
      margin-bottom: 20px;
    }

    .estado {
      font-size: 14px;
      opacity: 0.7;
      margin-bottom: 16px;
    }

    .estado.error { color: #ff5555; opacity: 1; }
    .estado.ok    { color: #66ff99; opacity: 1; }

    .carretera {
      margin-bottom: 16px;
      min-height: 28px;
    }

    .carretera .pastilla {
      display: inline-block;
      background: #1e5fb8;
      color: #fff;
      font-weight: 700;
      font-size: 20px;
      padding: 6px 14px;
      border-radius: 6px;
      letter-spacing: 0.5px;
    }

    .carretera .calle {
      font-size: 15px;
      opacity: 0.7;
    }

    .carretera .sin-carretera {
      font-size: 13px;
      opacity: 0.4;
      font-style: italic;
    }

    .ubicacion {
      margin-bottom: 20px;
      padding: 12px 0;
      border-top: 1px solid rgba(255,255,255,0.1);
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }

    .ubicacion .label {
      font-size: 11px;
      opacity: 0.5;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 4px;
    }

    .ubicacion .municipio {
      font-size: 26px;
      font-weight: 400;
      margin-bottom: 2px;
    }

    .ubicacion .admin {
      font-size: 14px;
      opacity: 0.6;
    }

    .coordenadas {
      font-size: 16px;
      opacity: 0.6;
      margin-bottom: 16px;
      line-height: 1.6;
    }

    .coordenadas b { opacity: 0.9; font-weight: 400; }

    .detalles {
      font-size: 13px;
      opacity: 0.6;
      line-height: 1.8;
    }

    .detalles span { opacity: 0.6; }
  </style>
</head>
<body>

  <h1>Panel de viaje</h1>

  <div id="estado" class="estado">Esperando permiso de GPS…</div>

  <div class="carretera" id="carreteraBloque">
    <span class="sin-carretera">Sin vía identificada</span>
  </div>

  <div class="ubicacion">
    <div class="label">Ubicación</div>
    <div id="municipio" class="municipio">—</div>
    <div id="admin" class="admin">—</div>
  </div>

  <div class="coordenadas">
    <div>Latitud: <b id="lat">—</b></div>
    <div>Longitud: <b id="lon">—</b></div>
  </div>

  <div class="detalles">
    <div><span>Precisión:</span> <b id="precision">—</b></div>
    <div><span>Velocidad:</span> <b id="velocidad">—</b></div>
    <div><span>Rumbo:</span> <b id="rumbo">—</b></div>
    <div><span>Última actualización:</span> <b id="hora">—</b></div>
  </div>

  <script src="js/debug.js"></script>
  <script src="js/carreteras.js"></script>
  <script src="js/location.js"></script>
