<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Panel de viaje</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      min-height: 100%;
      background: #0f1117;
      color: #fff;
      font-family: -apple-system, system-ui, sans-serif;
    }

    body {
      display: flex;
      flex-direction: column;
      padding: 16px;
    }

    /* Cuando el panel de debug está activo, reservamos espacio al final
       del body para que el último bloque no quede tapado. El propio
       debug.js añade y quita estas clases según su estado. */
    body.debug-activo {
      padding-bottom: calc(30vh + 32px);
    }
    body.debug-activo.debug-colapsado {
      padding-bottom: 50px;
    }

    h1 {
      font-size: 18px;
      font-weight: 400;
      opacity: 0.6;
      margin-bottom: 20px;
    }

    .estado {
      font-size: 14px;
      opacity: 0.7;
      margin-bottom: 16px;
    }

    .estado.error  { color: #ff5555; opacity: 1; }
    .estado.ok     { color: #66ff99; opacity: 1; }
    .estado.aviso  { color: #ffaa44; opacity: 1; }

    .carretera {
      margin-bottom: 16px;
      min-height: 28px;
    }

    .carretera .pastilla {
      display: inline-block;
      background: #1e5fb8;
      color: #fff;
      font-weight: 700;
      font-size: 20px;
      padding: 6px 14px;
      border-radius: 6px;
      letter-spacing: 0.5px;
    }

    /* Variante granate para carreteras autonómicas y locales (M-505, CL-601,
       CV-50, GI-632, A-92 andaluza, etc.). Decisión 19, sesión 9.6. */
    .carretera .pastilla.autonomica {
      background: #7a1f2b;
    }

    .carretera .calle {
      font-size: 15px;
      opacity: 0.7;
    }

    .carretera .sin-carretera {
      font-size: 13px;
      opacity: 0.4;
      font-style: italic;
    }

    .ubicacion {
      margin-bottom: 20px;
      padding: 12px 0;
      border-top: 1px solid rgba(255,255,255,0.1);
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }

    .ubicacion .label {
      font-size: 11px;
      opacity: 0.5;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 4px;
    }

    .ubicacion .municipio {
      font-size: 26px;
      font-weight: 400;
      margin-bottom: 2px;
    }

    .ubicacion .admin {
      font-size: 14px;
      opacity: 0.6;
    }

    /* ---- Bloque meteo ---- */
    .meteo {
      margin-bottom: 20px;
      padding: 12px 0;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }

    .meteo .label {
      font-size: 11px;
      opacity: 0.5;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 6px;
    }

    .meteo .temp {
      font-size: 26px;
      font-weight: 400;
      margin-bottom: 4px;
    }

    .meteo .descripcion {
      font-size: 16px;
      margin-bottom: 4px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .meteo .descripcion .icono {
      font-size: 22px;
      line-height: 1;
    }

    .meteo .descripcion .texto {
      opacity: 0.85;
    }

    .meteo .sub {
      font-size: 13px;
      opacity: 0.6;
      line-height: 1.6;
    }

    .meteo .sub.error { color: #ff5555; opacity: 1; }

    .meteo .prevision {
      margin-top: 6px;
      padding-top: 6px;
      border-top: 1px dashed rgba(255,255,255,0.08);
      font-size: 13px;
      opacity: 0.75;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    /* ---- Fin bloque meteo ---- */

    .coordenadas {
      font-size: 16px;
      opacity: 0.6;
      margin-bottom: 16px;
      line-height: 1.6;
    }

    .coordenadas b { opacity: 0.9; font-weight: 400; }

    .detalles {
      font-size: 13px;
      opacity: 0.6;
      line-height: 1.8;
    }

    .detalles span { opacity: 0.6; }

    /* ---- Bloque próxima salida ---- */
    .salida {
      margin-bottom: 16px;
      display: none;        /* oculto por defecto; JS lo muestra */
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .salida.visible { display: flex; }

    .salida-pastilla {
      display: inline-flex;
      align-items: baseline;
      gap: 10px;
      background: #1a7a35;
      color: #fff;
      padding: 6px 14px;
      border-radius: 6px;
    }

    .salida-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1px;
      opacity: 0.8;
      text-transform: uppercase;
    }

    .salida-num {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: 0.5px;
    }

    .salida-dist {
      font-size: 15px;
      opacity: 0.85;
    }

    .salida-sig {
      font-size: 13px;
      opacity: 0.45;
    }
    /* ---- Fin bloque próxima salida ---- */

    /* ---- Bloque POI: Qué ver por la zona ---- */
    .poi-seccion {
      margin-bottom: 20px;
      padding: 12px 0;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }

    /* Fila de tarjetas deslizable horizontalmente */
    .poi-scroll {
      display: flex;
      overflow-x: auto;
      gap: 10px;
      padding-bottom: 4px;
      -webkit-overflow-scrolling: touch;
    }
    .poi-scroll::-webkit-scrollbar { display: none; }

    .poi-pueblo {
      min-width: 175px;
      background: rgba(255,255,255,0.06);
      border-radius: 8px;
      padding: 10px;
      flex-shrink: 0;
    }

    .poi-pueblo-cab {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 6px;
      margin-bottom: 8px;
    }

    .poi-pueblo-nombre {
      font-size: 13px;
      font-weight: 600;
      opacity: 0.9;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      min-width: 0;
      flex: 1;
    }

    .poi-pueblo-dist {
      font-size: 11px;
      opacity: 0.45;
      flex-shrink: 0;
    }

    .poi-item {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 5px;
    }

    .poi-foto {
      width: 52px;
      height: 52px;
      object-fit: cover;
      border-radius: 6px;
      flex-shrink: 0;
    }

    .poi-icono-box {
      width: 52px;
      height: 52px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      background: rgba(255,255,255,0.08);
      border-radius: 6px;
      flex-shrink: 0;
    }

    .poi-nombre {
      font-size: 12px;
      opacity: 0.85;
      line-height: 1.35;
    }

    .poi-nombre-sec {
      font-size: 11px;
      opacity: 0.5;
    }
    /* ---- Fin bloque POI ---- */

    /* Datos del municipio (población, altitud) bajo la línea admin */
    .datos-municipio {
      font-size: 12px;
      opacity: 0.4;
      margin-top: 2px;
      line-height: 1.5;
    }

    /* Descripción + foto del municipio */
    .municipio-info {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      margin-top: 6px;
    }
    .municipio-info img {
      width: 52px;
      height: 52px;
      object-fit: cover;
      border-radius: 4px;
      flex-shrink: 0;
    }
    .municipio-info .municipio-desc {
      font-size: 12px;
      opacity: 0.55;
      line-height: 1.4;
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
    }
  </style>
</head>
<body>

  <h1>Panel de viaje</h1>

  <div id="estado" class="estado">Esperando permiso de GPS…</div>

  <div class="carretera" id="carreteraBloque">
    <span class="sin-carretera">Sin vía identificada</span>
  </div>

  <div id="salidaBloque" class="salida">
    <div class="salida-pastilla">
      <span class="salida-label">Salida</span>
      <span id="salidaNum" class="salida-num">—</span>
      <span id="salidaDist" class="salida-dist">—</span>
    </div>
    <span id="salidaSig" class="salida-sig"></span>
  </div>

  <div class="ubicacion">
    <div class="label">Ubicación</div>
    <div id="municipio" class="municipio">—</div>
    <div id="admin" class="admin">—</div>
    <div id="datosMunicipio" class="datos-municipio"></div>
    <div id="municipioInfo" class="municipio-info" style="display:none">
      <img id="municipioFoto" src="" alt="">
      <span id="municipioDesc" class="municipio-desc"></span>
    </div>
  </div>

  <div class="meteo" id="meteoBloque">
    <div class="label">Meteo</div>
    <div id="meteoTemp" class="temp">—</div>
    <div id="meteoDescripcion" class="descripcion">
      <span class="icono">—</span>
      <span class="texto">—</span>
    </div>
    <div id="meteoViento" class="sub">—</div>
    <div id="meteoHumedad" class="sub">—</div>
    <div id="meteoPrevision" class="prevision">—</div>
  </div>

  <div id="poiBloque" class="poi-seccion" style="display:none">
    <div class="label">Qué ver por la zona</div>
    <div id="poiScroll" class="poi-scroll"></div>
  </div>

  <div class="coordenadas">
    <div>Latitud: <b id="lat">—</b></div>
    <div>Longitud: <b id="lon">—</b></div>
  </div>

  <div class="detalles">
    <div><span>Precisión:</span> <b id="precision">—</b></div>
    <div><span>Velocidad:</span> <b id="velocidad">—</b></div>
    <div><span>Rumbo:</span> <b id="rumbo">—</b></div>
    <div><span>Última actualización:</span> <b id="hora">—</b></div>
  </div>

  <script src="js/debug.js"></script>
  <script src="js/wakelock.js"></script>
  <script src="js/carreteras.js"></script>
  <script src="js/overpass.js"></script>
  <script src="js/roadref.js"></script>
  <script src="js/location.js"></script>
  <script src="js/meteo_codigos.js"></script>
  <script src="js/weather.js"></script>
  <script src="js/motorwayexit.js"></script>
  <script src="js/pois.js"></script>
  <script src="js/rutas.js"></script>
  <script src="js/simulator.js"></script>
  <script>
    debug.log('Página cargada');

    // Pedir wake lock para que la pantalla no se apague durante el viaje.
    // El módulo se reactiva solo cuando la pestaña vuelve del segundo plano.
    if (window.WakeLock) {
      WakeLock.activar();
    }

    const $estado           = document.getElementById('estado');
    const $carreteraBloque  = document.getElementById('carreteraBloque');
    const $salidaBloque     = document.getElementById('salidaBloque');
    const $salidaNum        = document.getElementById('salidaNum');
    const $salidaDist       = document.getElementById('salidaDist');
    const $salidaSig        = document.getElementById('salidaSig');
    const $municipio        = document.getElementById('municipio');
    const $admin            = document.getElementById('admin');
    const $datosMunicipio   = document.getElementById('datosMunicipio');
    const $municipioInfo    = document.getElementById('municipioInfo');
    const $municipioFoto    = document.getElementById('municipioFoto');
    const $municipioDesc    = document.getElementById('municipioDesc');
    const $poiBloque        = document.getElementById('poiBloque');
    const $poiScroll        = document.getElementById('poiScroll');
    const $meteoTemp        = document.getElementById('meteoTemp');
    const $meteoDescripcion = document.getElementById('meteoDescripcion');
    const $meteoViento      = document.getElementById('meteoViento');
    const $meteoHumedad     = document.getElementById('meteoHumedad');
    const $meteoPrevision   = document.getElementById('meteoPrevision');
    const $lat              = document.getElementById('lat');
    const $lon              = document.getElementById('lon');
    const $precision        = document.getElementById('precision');
    const $velocidad        = document.getElementById('velocidad');
    const $rumbo            = document.getElementById('rumbo');
    const $hora             = document.getElementById('hora');

    const UMBRAL_DESPLAZAMIENTO_M = 50;

    let ultimaPosicionUbicacion = null;
    let ultimaUbicacionMostrada = null;
    let ultimaCarreteraMostrada = null;
    let ultimaMeteoMostrada     = null;
    // Código de vía actual (A-6, M-505...) o null. Se actualiza en los tres
    // caminos de actualizarCarretera() y lo consume MotorwayExitModule en
    // cada tick de GPS para saber en qué vía buscar próximas salidas.
    let roadRefActual           = null;
    let municipioActual         = null;
    // Si el último pintado del bloque meteo fue un estado de error, lo
    // guardamos aquí para forzar el repintado en cuanto llegue cualquier
    // dato válido, aunque la clave de dedupe coincida con el último válido
    // anterior. Resuelve el "meteo fantasma" detectado en sesión 9.6.
    let meteoEnError            = false;
    let ultimoTickGPS           = null;
    const UMBRAL_GPS_OBSOLETO_MS = 3 * 60 * 1000; // 3 minutos

    function escapar(texto) {
      const div = document.createElement('div');
      div.textContent = texto;
      return div.innerHTML;
    }

    function distanciaMetros(lat1, lon1, lat2, lon2) {
      const R = 6371000;
      const toRad = (g) => g * Math.PI / 180;
      const dLat = toRad(lat2 - lat1);
      const dLon = toRad(lon2 - lon1);
      const a = Math.sin(dLat / 2) ** 2 +
                Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) *
                Math.sin(dLon / 2) ** 2;
      return 2 * R * Math.asin(Math.sqrt(a));
    }

    function mostrarEstado(texto, clase) {
      $estado.textContent = texto;
      $estado.className = 'estado ' + (clase || '');
    }

    function formatearAdmin(info) {
      if (!info.ccaa && !info.provincia) return '—';
      if (info.provincia && info.ccaa && info.provincia !== info.ccaa) {
        return `${info.provincia} · ${info.ccaa}`;
      }
      return info.provincia || info.ccaa;
    }

    function pintarCarretera(info) {
      if (info && info.codigo) {
        // Pastilla azul (estatal) o granate (autonómica). Si por algún motivo
        // tipo viniera vacío, defaulteamos a azul para no romper el aspecto.
        const claseExtra = info.tipo === 'autonomica' ? ' autonomica' : '';
        $carreteraBloque.innerHTML =
          `<span class="pastilla${claseExtra}">${escapar(info.codigo)}</span>`;
      } else if (info && info.textoCrudo) {
        $carreteraBloque.innerHTML =
          `<span class="calle">${escapar(info.textoCrudo)}</span>`;
      } else {
        $carreteraBloque.innerHTML =
          `<span class="sin-carretera">Sin vía identificada</span>`;
      }
    }

    async function actualizarUbicacionAdministrativa(lat, lon) {
      try {
        const info = await LocationModule.obtenerUbicacion(lat, lon);
        const clave = `${info.municipio}|${info.provincia}|${info.ccaa}`;
        if (clave === ultimaUbicacionMostrada) return;
        ultimaUbicacionMostrada = clave;

        municipioActual = info.municipio || null;
        $municipio.textContent = info.municipio || '(municipio desconocido)';
        $admin.textContent = formatearAdmin(info);
        debug.log(`Ubicación [${info.fuente}]: ${info.municipio} · ${formatearAdmin(info)}`);
      } catch (err) {
        debug.error(`LocationModule.ubicacion: ${err.message}`);
      }
    }

    async function actualizarCarretera(lat, lon) {
      try {
        const info = await LocationModule.obtenerCarretera(lat, lon);

        // Caso A: Nominatim ya dio código (estatal conocida o ref directa).
        // Se pinta y fin.
        if (info.codigo) {
          const clave = `${info.codigo}|${info.tipo}|${info.textoCrudo}`;
          if (clave === ultimaCarreteraMostrada) return;
          ultimaCarreteraMostrada = clave;
          roadRefActual = info.codigo;
          pintarCarretera(info);
          debug.log(`Carretera [${info.fuente}]: ${info.codigo} (${info.tipo}, crudo: "${info.textoCrudo}")`);
          return;
        }

        // Caso B: Nominatim dio nombre de vía pero sin código reconocible.
        // Éste es el caso típico de las autonómicas con nombre popular
        // (M-505 = "Carretera de El Escorial", CL-601 con nombre histórico,
        // etc.). Nominatim no expone consistentemente extratags.ref, así
        // que preguntamos a Overpass directamente qué ref tiene el way en
        // este punto. Decisión 22, sesión 9.8.
        if (info.textoCrudo && window.RoadRef) {
          const refOverpass = await RoadRef.consultar(lat, lon);
          if (refOverpass) {
            const rescatado = Carreteras.extraerCodigo(refOverpass);
            if (rescatado && rescatado.codigo) {
              const infoRescatada = {
                codigo: rescatado.codigo,
                tipo: rescatado.tipo,
                textoCrudo: info.textoCrudo,
                fuente: 'overpass',
              };
              const clave = `${infoRescatada.codigo}|${infoRescatada.tipo}|${infoRescatada.textoCrudo}`;
              if (clave === ultimaCarreteraMostrada) return;
              ultimaCarreteraMostrada = clave;
              roadRefActual = infoRescatada.codigo;
              pintarCarretera(infoRescatada);
              debug.log(`Carretera [overpass]: ${infoRescatada.codigo} (${infoRescatada.tipo}, rescatada · crudo Nominatim: "${info.textoCrudo}")`);
              return;
            }
          }
          // Overpass tampoco lo supo. Caemos al texto discreto.
        }

        // Caso C: ni Nominatim ni Overpass han dado código.
        // Pintamos textoCrudo en modo discreto o "sin vía".
        const clave = `${info.codigo}|${info.tipo}|${info.textoCrudo}`;
        if (clave === ultimaCarreteraMostrada) return;
        ultimaCarreteraMostrada = clave;
        roadRefActual = null;
        pintarCarretera(info);
        if (info.textoCrudo) {
          debug.log(`Vía [${info.fuente}]: "${info.textoCrudo}" (sin código ni en Nominatim ni en Overpass)`);
        } else {
          debug.log(`Carretera [${info.fuente}]: sin vía en Nominatim`);
        }
      } catch (err) {
        debug.error(`LocationModule.carretera: ${err.message}`);
      }
    }

    // Construye el resumen de previsión horaria con icono de la categoría
    // más severa del tramo y texto de min→max de temperatura + lluvia.
    function construirResumenPrevision(horas) {
      if (!horas || horas.length === 0) {
        return { icono: '❓', texto: 'Sin previsión' };
      }
      const n = horas.length;
      const tempInicio = Math.round(horas[0].temperatura);
      const tempFin = Math.round(horas[n - 1].temperatura);
      const unidad = horas[0].temperaturaUnidad || '°C';

      let maxLluvia = 0;
      for (let i = 0; i < n; i++) {
        const p = horas[i].precipProbabilidad;
        if (typeof p === 'number' && p > maxLluvia) maxLluvia = p;
      }

      const categoria = MeteoCodigos.categoriaMasSevera(horas);
      const icono = MeteoCodigos.iconoDeCategoria(categoria);

      const partes = [`Próx. ${n}h: ${tempInicio}${unidad} → ${tempFin}${unidad}`];
      if (maxLluvia > 0) {
        partes.push(`lluvia máx ${maxLluvia}%`);
      } else {
        partes.push('sin lluvia prevista');
      }
      return { icono: icono, texto: partes.join(' · ') };
    }

    async function actualizarMeteo(lat, lon) {
      try {
        const meteo = await Weather.obtenerTiempoActual(lat, lon);
        const clave = `${meteo.hora}|${meteo.weatherCode}`;
        // Dedupe normal: si la clave coincide y NO venimos de error, salimos.
        // Si venimos de error, forzamos el repintado aunque coincida la clave,
        // porque la pantalla está mostrando "Error meteo" y hay que limpiarlo.
        if (clave === ultimaMeteoMostrada && !meteoEnError) return;
        ultimaMeteoMostrada = clave;

        $meteoTemp.textContent =
          `${Math.round(meteo.temperatura)}${meteo.temperaturaUnidad} · sensación ${Math.round(meteo.sensacion)}${meteo.sensacionUnidad}`;

        // Descripción con icono y texto
        $meteoDescripcion.innerHTML =
          `<span class="icono">${meteo.icono}</span><span class="texto">${escapar(meteo.descripcion)}</span>`;

        $meteoViento.className = 'sub';
        $meteoViento.textContent =
          `Viento ${Math.round(meteo.vientoVelocidad)} ${meteo.vientoUnidad} · ${meteo.vientoDireccion}°`;
        $meteoHumedad.className = 'sub';
        $meteoHumedad.textContent =
          `Humedad ${meteo.humedad}${meteo.humedadUnidad}`;

        const resumen = construirResumenPrevision(meteo.previsionHoraria);
        $meteoPrevision.innerHTML =
          `<span>${resumen.icono}</span><span>${escapar(resumen.texto)}</span>`;

        const nHoras = meteo.previsionHoraria ? meteo.previsionHoraria.length : 0;
        const etiqueta = meteo.deCache ? ' [cache]' : '';
        const recuperado = meteoEnError ? ' (recuperado de error)' : '';
        debug.log(`Meteo pintada${etiqueta}${recuperado}: ${Math.round(meteo.temperatura)}° ${meteo.categoria} (${meteo.descripcion}) + ${nHoras}h previsión`);

        meteoEnError = false;
      } catch (err) {
        $meteoTemp.textContent = 'Error meteo';
        $meteoDescripcion.innerHTML =
          `<span class="icono">⚠️</span><span class="texto">${escapar(err.message || 'fallo')}</span>`;
        $meteoViento.textContent = '—';
        $meteoHumedad.textContent = '—';
        $meteoPrevision.textContent = '—';
        meteoEnError = true;
        debug.error(`Weather: ${err.message}`);
      }
    }

    // --- POIModule ---

    function pintarPOIs(resultado) {
      // Datos del municipio actual (población, altitud)
      const dm = resultado.datosMunicipio;
      if (dm) {
        const partes = [];
        if (dm.comarca   != null) partes.push(dm.comarca);
        if (dm.poblacion != null) partes.push(dm.poblacion.toLocaleString('es') + ' hab');
        if (dm.altitud   != null) partes.push(dm.altitud + ' m');
        $datosMunicipio.textContent = partes.join(' · ');
        // Descripción y foto del municipio
        if (dm.descripcion || dm.foto) {
          if (dm.foto) {
            $municipioFoto.src = dm.foto;
            $municipioFoto.style.display = '';
          } else {
            $municipioFoto.style.display = 'none';
          }
          $municipioDesc.textContent = dm.descripcion || '';
          $municipioInfo.style.display = '';
        } else {
          $municipioInfo.style.display = 'none';
        }
      } else {
        $datosMunicipio.textContent = '';
        $municipioInfo.style.display = 'none';
      }

      // Tarjetas de todos los pueblos cercanos, tengan POIs o no.
      // Una tarjeta con solo nombre+distancia ya es info útil para el conductor.
      // La sección solo se oculta si no hay ningún pueblo en absoluto.
      const pueblos = resultado.pueblosCercanos || [];
      if (pueblos.length === 0) {
        $poiBloque.style.display = 'none';
        return;
      }

      $poiScroll.innerHTML = pueblos.map(pueblo => {
        const dist = pueblo.distKm < 1
          ? Math.round(pueblo.distKm * 1000) + ' m'
          : pueblo.distKm.toFixed(1) + ' km';

        const poisHtml = pueblo.pois.map((poi, i) => {
          if (i === 0) {
            // POI principal: foto o icono grande + nombre
            const mediaHtml = poi.foto
              ? `<img class="poi-foto" src="${escapar(poi.foto)}" alt="" loading="lazy">`
              : `<span class="poi-icono-box">${escapar(poi.icono)}</span>`;
            return `<div class="poi-item">
              ${mediaHtml}
              <span class="poi-nombre">${escapar(poi.nombre)}</span>
            </div>`;
          } else {
            // POI secundario: icono pequeño + nombre discreto
            return `<div class="poi-item">
              <span style="font-size:14px;opacity:0.5;flex-shrink:0">${escapar(poi.icono)}</span>
              <span class="poi-nombre-sec">${escapar(poi.nombre)}</span>
            </div>`;
          }
        }).join('');

        return `<div class="poi-pueblo">
          <div class="poi-pueblo-cab">
            <span class="poi-pueblo-nombre">${escapar(pueblo.nombre)}</span>
            <span class="poi-pueblo-dist">${escapar(dist)}</span>
          </div>
          ${poisHtml}
        </div>`;
      }).join('');

      $poiBloque.style.display = '';
    }

    let poiChequeado = false;

    function actualizarPOIs(lat, lon) {
      if (!poiChequeado) {
        poiChequeado = true;
        if (window.POIModule) {
          debug.log('POIModule: cargado, primer tick recibido');
        } else {
          debug.error('POIModule: no disponible');
          return;
        }
      }
      if (!window.POIModule) return;
      // Fire-and-forget. Cuando resuelve, pintamos los resultados.
      POIModule.actualizar(lat, lon, municipioActual).then(resultado => {
        if (resultado) pintarPOIs(resultado);
      }).catch(err => {
        debug.error(`POIModule: ${err.message}`);
      });
    }

    // Estado del último log de próximas salidas, para evitar spammear
    // el panel de debug con el mismo resultado en cada tick de GPS.
    let ultimoLogSalidas = null;
    // Flag: ¿ya hemos logueado la disponibilidad del módulo? Evita spam
    // si el módulo falta, y da una señal clara en el primer tick.
    let motorwayExitChequeado = false;

    function actualizarProximasSalidas(lat, lon, rumbo, velocidadKmh) {
      if (!motorwayExitChequeado) {
        motorwayExitChequeado = true;
        if (window.MotorwayExitModule) {
          debug.log('MotorwayExit: módulo cargado, primer tick recibido');
        } else {
          debug.error('MotorwayExit: window.MotorwayExitModule NO DISPONIBLE — módulo no cargado o falló al inicializar');
          return;
        }
      }
      if (!window.MotorwayExitModule) return;
      try {
        const r = MotorwayExitModule.actualizar({
          lat, lon, rumbo, velocidadKmh, roadRef: roadRefActual,
        });
        // Dedupe del log: solo logueamos cuando cambia algo material
        // (estado, ref de proxima, ref de siguiente, o la distancia de
        // próxima varía más de 0.5 km). Así no se llena el debug con
        // una línea por cada tick de GPS.
        const proxRef = r.proxima ? r.proxima.ref : null;
        const proxKm  = r.proxima ? Math.round(r.proxima.distanciaKm * 2) / 2 : null;
        const sigRef  = r.siguiente ? r.siguiente.ref : null;
        const clave = `${r.estado}|${proxRef}|${proxKm}|${sigRef}`;
        if (clave !== ultimoLogSalidas) {
          ultimoLogSalidas = clave;
          if (r.estado === 'ok') {
            const sigTxt = r.siguiente
              ? `, luego ${r.siguiente.ref} a ${r.siguiente.distanciaKm}km`
              : '';
            debug.log(`MotorwayExit: próxima ${r.proxima.ref} a ${r.proxima.distanciaKm}km${sigTxt}`);
          } else {
            debug.log(`MotorwayExit: ${r.estado}${roadRefActual ? ' (vía ' + roadRefActual + ')' : ''}`);
          }
        }
        // Actualizar bloque visual
        if (r.activo) {
          $salidaNum.textContent  = r.proxima.ref;
          $salidaDist.textContent = r.proxima.distanciaKm + ' km';
          $salidaSig.textContent  = r.siguiente ? 'luego ' + r.siguiente.ref : '';
          $salidaBloque.classList.add('visible');
        } else {
          $salidaBloque.classList.remove('visible');
        }
      } catch (err) {
        debug.error(`MotorwayExit: ${err.message}`);
      }
    }

    function alRecibirPosicion(pos) {
      const c = pos.coords;
      $lat.textContent = c.latitude.toFixed(6);
      $lon.textContent = c.longitude.toFixed(6);
      $precision.textContent = c.accuracy != null ? `${c.accuracy.toFixed(1)} m` : '—';
      $velocidad.textContent = c.speed != null
        ? `${(c.speed * 3.6).toFixed(1)} km/h`
        : 'no disponible';
      $rumbo.textContent = c.heading != null && !isNaN(c.heading)
        ? `${c.heading.toFixed(0)}°`
        : 'no disponible';
      $hora.textContent = new Date().toTimeString().slice(0, 8);

      ultimoTickGPS = Date.now();
      mostrarEstado('GPS activo', 'ok');

      let hayQueActualizar = false;
      if (!ultimaPosicionUbicacion) {
        hayQueActualizar = true;
      } else {
        const dist = distanciaMetros(
          c.latitude, c.longitude,
          ultimaPosicionUbicacion.lat, ultimaPosicionUbicacion.lon
        );
        if (dist >= UMBRAL_DESPLAZAMIENTO_M) {
          hayQueActualizar = true;
          debug.log(`Movimiento detectado: ${dist.toFixed(0)}m`);
        }
      }

      if (hayQueActualizar) {
        debug.log(`Posición: ${c.latitude.toFixed(5)}, ${c.longitude.toFixed(5)} (±${c.accuracy?.toFixed(0)}m)`);
        ultimaPosicionUbicacion = { lat: c.latitude, lon: c.longitude };
        actualizarUbicacionAdministrativa(c.latitude, c.longitude);
        actualizarCarretera(c.latitude, c.longitude);
        actualizarMeteo(c.latitude, c.longitude);
        actualizarPOIs(c.latitude, c.longitude);
      }

      // MotorwayExit se evalúa en CADA tick, no solo cada 50 m. Es barato
      // (filtro local sobre decenas de junctions) y necesita rumbo y
      // distancia frescos para dar una próxima salida precisa. La consulta
      // a Overpass solo se dispara al entrar en vía nueva o refrescar a 35km,
      // gobernado por el propio módulo.
      const velocidadKmh = (c.speed != null && !isNaN(c.speed)) ? c.speed * 3.6 : null;
      const rumboGrados  = (c.heading != null && !isNaN(c.heading)) ? c.heading : null;
      actualizarProximasSalidas(c.latitude, c.longitude, rumboGrados, velocidadKmh);
    }

    function alFallarPosicion(err) {
      const motivos = {
        1: 'Permiso denegado',
        2: 'Posición no disponible',
        3: 'Tiempo de espera agotado',
      };
      const motivo = motivos[err.code] || 'Error desconocido';
      mostrarEstado(`Error de GPS: ${motivo}`, 'error');
      debug.error(`GPS error ${err.code}: ${err.message}`);
    }

    // Vigilante de datos obsoletos: si pasan más de 3 min sin tick de GPS,
    // avisa al usuario con el tiempo transcurrido. Se comprueba cada 30 s.
    setInterval(() => {
      if (!ultimoTickGPS) return;
      const hace = Date.now() - ultimoTickGPS;
      if (hace > UMBRAL_GPS_OBSOLETO_MS) {
        const min = Math.floor(hace / 60000);
        const seg = Math.floor((hace % 60000) / 1000);
        const texto = min > 0 ? `Datos de hace ${min} min` : `Datos de hace ${seg} s`;
        mostrarEstado(texto, 'aviso');
      }
    }, 30000);

    // Arranque: elegir entre GPS real y simulador.
    // Si ?sim=<ruta> está en la URL, el simulador toma el mando y el GPS
    // ni siquiera se pide. Útil para pruebas desde casa sin conducir.
    if (window.Simulator && Simulator.estaActivo()) {
      mostrarEstado(`Simulación: ${Simulator.nombreRuta()}`, 'ok');
      debug.log(`Modo simulación activo: ${Simulator.nombreRuta()}`);
      Simulator.iniciar(alRecibirPosicion);
    } else if (!('geolocation' in navigator)) {
      mostrarEstado('Este navegador no soporta GPS', 'error');
      debug.error('navigator.geolocation no disponible');
    } else {
      debug.log('Solicitando permiso de GPS…');
      navigator.geolocation.watchPosition(
        alRecibirPosicion,
        alFallarPosicion,
        {
          enableHighAccuracy: true,
          maximumAge: 0,
          timeout: 30000,
        }
      );
    }
  </script>

</body>
</html>
